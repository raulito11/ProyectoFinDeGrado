<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Mis Reservas — Wireframe</title>
</head>
<body style="font-family: Arial, sans-serif; margin: 0; padding: 0;">

    <!-- Cabecera del restaurante -->
    <header style="background: #2c2c2c; color: white; padding: 14px 24px; display: flex; justify-content: space-between; align-items: center;">
        <h1 style="margin: 0; font-size: 22px;">Restaurante El Olivo</h1>
        <nav>
            <a href="dashboard.html"
               style="color: white; margin-right: 20px; text-decoration: none; font-weight: bold; border-bottom: 2px solid white;">
                Mis reservas
            </a>
            <a href="nueva_reserva.html"
               style="color: #ccc; margin-right: 20px; text-decoration: none;">
                Nueva reserva
            </a>
            <a href="login.html"
               style="color: #ccc; text-decoration: none;">
                Cerrar sesión
            </a>
        </nav>
    </header>

    <main style="padding: 24px 32px;">

        <h2 style="margin-bottom: 6px;">Mis Reservas</h2>
        <p style="color: #555; margin-top: 0; margin-bottom: 20px;">
            Aquí puedes ver y gestionar todas tus reservas.
        </p>

        <!-- Botón destacado nueva reserva -->
        <a href="nueva_reserva.html">
            <button style="padding: 10px 20px; background: #2c6fad; color: white; border: none; border-radius: 4px; font-size: 15px; cursor: pointer; margin-bottom: 20px;">
                + Nueva reserva
            </button>
        </a>

        <!-- Tabla de reservas -->
        <table style="width: 100%; border-collapse: collapse; font-size: 15px;">
            <thead>
                <tr style="background: #f0f0f0; text-align: left;">
                    <th style="padding: 10px 14px; border: 1px solid #ccc;">Fecha</th>
                    <th style="padding: 10px 14px; border: 1px solid #ccc;">Hora</th>
                    <th style="padding: 10px 14px; border: 1px solid #ccc;">Personas</th>
                    <th style="padding: 10px 14px; border: 1px solid #ccc;">Estado</th>
                    <th style="padding: 10px 14px; border: 1px solid #ccc;">Acción</th>
                </tr>
            </thead>
            <tbody>

                <!-- Fila 1: reserva confirmada -->
                <tr>
                    <td style="padding: 10px 14px; border: 1px solid #ddd;">20/04/2026</td>
                    <td style="padding: 10px 14px; border: 1px solid #ddd;">21:00</td>
                    <td style="padding: 10px 14px; border: 1px solid #ddd;">4</td>
                    <td style="padding: 10px 14px; border: 1px solid #ddd;">
                        <span style="color: #1a7f37; background: #d4f0dc; padding: 3px 10px; border-radius: 12px; font-size: 13px; font-weight: bold;">
                            confirmada
                        </span>
                    </td>
                    <td style="padding: 10px 14px; border: 1px solid #ddd;">
                        <button style="padding: 6px 14px; background: #c0392b; color: white; border: none; border-radius: 4px; cursor: pointer;">
                            Cancelar
                        </button>
                    </td>
                </tr>

                <!-- Fila 2: reserva pendiente -->
                <tr>
                    <td style="padding: 10px 14px; border: 1px solid #ddd;">25/04/2026</td>
                    <td style="padding: 10px 14px; border: 1px solid #ddd;">14:00</td>
                    <td style="padding: 10px 14px; border: 1px solid #ddd;">2</td>
                    <td style="padding: 10px 14px; border: 1px solid #ddd;">
                        <span style="color: #9a5e00; background: #fff0c4; padding: 3px 10px; border-radius: 12px; font-size: 13px; font-weight: bold;">
                            pendiente
                        </span>
                    </td>
                    <td style="padding: 10px 14px; border: 1px solid #ddd;">
                        <button style="padding: 6px 14px; background: #c0392b; color: white; border: none; border-radius: 4px; cursor: pointer;">
                            Cancelar
                        </button>
                    </td>
                </tr>

                <!-- Fila 3: reserva cancelada — botón deshabilitado -->
                <tr style="background: #fafafa; color: #999;">
                    <td style="padding: 10px 14px; border: 1px solid #ddd;">10/04/2026</td>
                    <td style="padding: 10px 14px; border: 1px solid #ddd;">20:30</td>
                    <td style="padding: 10px 14px; border: 1px solid #ddd;">6</td>
                    <td style="padding: 10px 14px; border: 1px solid #ddd;">
                        <span style="color: #9b1c1c; background: #fde8e8; padding: 3px 10px; border-radius: 12px; font-size: 13px; font-weight: bold;">
                            cancelada
                        </span>
                    </td>
                    <td style="padding: 10px 14px; border: 1px solid #ddd;">
                        <button
                            disabled
                            style="padding: 6px 14px; background: #ccc; color: #888; border: none; border-radius: 4px; cursor: not-allowed;">
                            Cancelar
                        </button>
                    </td>
                </tr>

            </tbody>
        </table>

    </main>

</body>
</html>
