<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Inicio de sesión</title>
</head>
<body style="font-family: Arial, sans-serif; max-width: 420px; margin: 60px auto; padding: 0 20px;">

    <main>
        <h1 style="text-align: center; margin-bottom: 24px;">Inicio de sesión</h1>

        <form action="#" method="post" style="border: 1px solid #ccc; padding: 24px; border-radius: 6px;">

            <!-- Mensaje de error -->
            <p id="error-msg" style="color: red; background: #fff0f0; border: 1px solid #f5c6c6; padding: 8px 12px; display: block;">
                [Espacio para mensaje de error — ej: "Credenciales incorrectas"]
            </p>

            <div style="margin-bottom: 16px;">
                <label for="email" style="display: block; margin-bottom: 4px; font-weight: bold;">
                    Correo electrónico
                </label>
                <input
                    type="email"
                    id="email"
                    name="email"
                    placeholder="ejemplo@correo.com"
                    style="width: 100%; padding: 8px; box-sizing: border-box; border: 1px solid #aaa; border-radius: 4px;"
                >
            </div>

            <div style="margin-bottom: 24px;">
                <label for="password" style="display: block; margin-bottom: 4px; font-weight: bold;">
                    Contraseña
                </label>
                <input
                    type="password"
                    id="password"
                    name="password"
                    placeholder="••••••••"
                    style="width: 100%; padding: 8px; box-sizing: border-box; border: 1px solid #aaa; border-radius: 4px;"
                >
            </div>

            <button
                type="submit"
                style="width: 100%; padding: 10px; background: #2c6fad; color: white; border: none; border-radius: 4px; font-size: 16px; cursor: pointer;">
                Entrar
            </button>

        </form>

        <!-- Enlace de navegación solo para wireframe -->
        <p style="text-align: center; margin-top: 20px;">
            <a href="dashboard.html">Ver dashboard →</a>
            <span style="font-size: 12px; color: #999;">(enlace de wireframe)</span>
        </p>

    </main>

</body>
</html>
